<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050505;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0f1a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines -->
  <g opacity="0.04" stroke="#60a5fa" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
  </g>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#60a5fa" opacity="0.8"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="3" fill="#60a5fa" opacity="0.6"/>

  <!-- Category badge -->
  <rect x="52" y="52" width="160" height="22" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.7"/>
  <text x="132" y="68" font-family="'Orbitron','JetBrains Mono',monospace" font-size="10" font-weight="700" fill="#60a5fa" text-anchor="middle" letter-spacing="3">CLOUD_NATIVE</text>

  <!-- Main title -->
  <text x="52" y="140" font-family="'Orbitron','JetBrains Mono',monospace" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">GITOPS IS NOT</text>
  <text x="52" y="205" font-family="'Orbitron','JetBrains Mono',monospace" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">JUST ARGO —</text>
  <text x="52" y="270" font-family="'Orbitron','JetBrains Mono',monospace" font-size="40" font-weight="700" fill="#60a5fa" filter="url(#glow)" letter-spacing="-1">IT IS A CULTURE SHIFT</text>

  <!-- Subtitle -->
  <text x="52" y="320" font-family="'Orbitron','JetBrains Mono',monospace" font-size="16" fill="#cbd5e1" letter-spacing="1">Git as the only source of truth — reconciliation loops,</text>
  <text x="52" y="342" font-family="'Orbitron','JetBrains Mono',monospace" font-size="16" fill="#cbd5e1" letter-spacing="1">drift detection, and the discipline to not kubectl apply.</text>

  <!-- Tags -->
  <rect x="52" y="375" width="80" height="22" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.6"/>
  <text x="92" y="391" font-family="'Orbitron','JetBrains Mono',monospace" font-size="10" font-weight="700" fill="#93c5fd" text-anchor="middle" letter-spacing="2">GITOPS</text>

  <rect x="144" y="375" width="80" height="22" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.6"/>
  <text x="184" y="391" font-family="'Orbitron','JetBrains Mono',monospace" font-size="10" font-weight="700" fill="#93c5fd" text-anchor="middle" letter-spacing="2">ARGOCD</text>

  <rect x="236" y="375" width="110" height="22" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.6"/>
  <text x="291" y="391" font-family="'Orbitron','JetBrains Mono',monospace" font-size="10" font-weight="700" fill="#93c5fd" text-anchor="middle" letter-spacing="2">KUBERNETES</text>

  <rect x="358" y="375" width="80" height="22" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.6"/>
  <text x="398" y="391" font-family="'Orbitron','JetBrains Mono',monospace" font-size="10" font-weight="700" fill="#93c5fd" text-anchor="middle" letter-spacing="2">DEVOPS</text>

  <!-- Divider -->
  <line x1="52" y1="420" x2="500" y2="420" stroke="#334155" stroke-width="1"/>

  <!-- Author + read time -->
  <text x="52" y="445" font-family="'Orbitron','JetBrains Mono',monospace" font-size="13" fill="#94a3b8" letter-spacing="2">ANDRII ZELENETS</text>
  <text x="260" y="445" font-family="'Orbitron','JetBrains Mono',monospace" font-size="13" fill="#64748b" letter-spacing="1">// 10 MIN READ</text>

  <!-- Site URL -->
  <text x="52" y="590" font-family="'Orbitron','JetBrains Mono',monospace" font-size="12" fill="#64748b" letter-spacing="2">azelenets.github.io</text>

  <!-- ── Right panel: GitOps loop diagram ── -->

  <!-- Panel background -->
  <rect x="620" y="40" width="540" height="550" fill="#0a0f1a" stroke="#1e293b" stroke-width="1" rx="2"/>
  <rect x="620" y="40" width="540" height="24" fill="#111827" stroke="#1e293b" stroke-width="1" rx="2"/>
  <text x="890" y="57" font-family="'Orbitron','JetBrains Mono',monospace" font-size="10" fill="#7dd3fc" text-anchor="middle" letter-spacing="3">GITOPS RECONCILIATION LOOP</text>

  <!-- Developer box -->
  <rect x="648" y="88" width="110" height="44" fill="#0d1117" stroke="#60a5fa" stroke-width="1.5" rx="2"/>
  <text x="703" y="107" font-family="'Orbitron','JetBrains Mono',monospace" font-size="10" font-weight="700" fill="#93c5fd" text-anchor="middle" letter-spacing="2">DEVELOPER</text>
  <text x="703" y="122" font-family="'Orbitron','JetBrains Mono',monospace" font-size="9" fill="#94a3b8" text-anchor="middle">git push</text>

  <!-- Arrow: Developer → CI Pipeline -->
  <line x1="758" y1="110" x2="790" y2="110" stroke="#60a5fa" stroke-width="1.5" opacity="0.7"/>
  <polygon points="790,106 800,110 790,114" fill="#60a5fa" opacity="0.7"/>

  <!-- CI Pipeline box -->
  <rect x="800" y="88" width="110" height="44" fill="#0d1117" stroke="#4ade80" stroke-width="1.5" rx="2"/>
  <text x="855" y="107" font-family="'Orbitron','JetBrains Mono',monospace" font-size="10" font-weight="700" fill="#86efac" text-anchor="middle" letter-spacing="2">CI PIPELINE</text>
  <text x="855" y="122" font-family="'Orbitron','JetBrains Mono',monospace" font-size="9" fill="#94a3b8" text-anchor="middle">build + test</text>

  <!-- Arrow: CI → Git Repo -->
  <line x1="910" y1="110" x2="938" y2="110" stroke="#4ade80" stroke-width="1.5" opacity="0.7"/>
  <polygon points="938,106 948,110 938,114" fill="#4ade80" opacity="0.7"/>

  <!-- Git Repo box (right side) -->
  <rect x="948" y="75" width="120" height="68" fill="#0d1117" stroke="#f59e0b" stroke-width="2" rx="2"/>
  <text x="1008" y="99" font-family="'Orbitron','JetBrains Mono',monospace" font-size="10" font-weight="700" fill="#fbbf24" text-anchor="middle" letter-spacing="2">GIT REPO</text>
  <text x="1008" y="114" font-family="'Orbitron','JetBrains Mono',monospace" font-size="8" fill="#a8a29e" text-anchor="middle">image: app:v2.4.1</text>
  <text x="1008" y="128" font-family="'Orbitron','JetBrains Mono',monospace" font-size="8" fill="#a8a29e" text-anchor="middle">source of truth</text>

  <!-- Label: writes image tag -->
  <text x="920" y="100" font-family="'Orbitron','JetBrains Mono',monospace" font-size="7" fill="#4ade80" text-anchor="middle">writes</text>
  <text x="920" y="110" font-family="'Orbitron','JetBrains Mono',monospace" font-size="7" fill="#4ade80" text-anchor="middle">image tag</text>

  <!-- Arrow: Git Repo ← ArgoCD (pull, going downward) -->
  <line x1="1008" y1="143" x2="1008" y2="195" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  <polygon points="1004,195 1008,205 1012,195" fill="#60a5fa" opacity="0.7"/>
  <text x="1022" y="162" font-family="'Orbitron','JetBrains Mono',monospace" font-size="8" fill="#93c5fd">pull every</text>
  <text x="1022" y="174" font-family="'Orbitron','JetBrains Mono',monospace" font-size="8" fill="#93c5fd">30s</text>

  <!-- ArgoCD box -->
  <rect x="948" y="205" width="120" height="52" fill="#0d1117" stroke="#60a5fa" stroke-width="2" rx="2"/>
  <text x="1008" y="225" font-family="'Orbitron','JetBrains Mono',monospace" font-size="10" font-weight="700" fill="#93c5fd" text-anchor="middle" letter-spacing="2">ARGOCD</text>
  <text x="1008" y="241" font-family="'Orbitron','JetBrains Mono',monospace" font-size="8" fill="#94a3b8" text-anchor="middle">reconcile loop</text>

  <!-- Arrow: ArgoCD → K8s Cluster -->
  <line x1="948" y1="231" x2="900" y2="231" stroke="#60a5fa" stroke-width="1.5" opacity="0.7"/>
  <polygon points="900,227 890,231 900,235" fill="#60a5fa" opacity="0.7"/>
  <text x="924" y="224" font-family="'Orbitron','JetBrains Mono',monospace" font-size="8" fill="#93c5fd">sync</text>

  <!-- K8s Cluster box -->
  <rect x="648" y="200" width="230" height="96" fill="#0d1117" stroke="#60a5fa" stroke-width="1.5" rx="2"/>
  <text x="763" y="218" font-family="'Orbitron','JetBrains Mono',monospace" font-size="10" font-weight="700" fill="#93c5fd" text-anchor="middle" letter-spacing="2">K8S CLUSTER</text>

  <!-- Pods inside cluster -->
  <rect x="660" y="226" width="55" height="28" fill="#0f172a" stroke="#3b82f6" stroke-width="1" rx="1"/>
  <text x="687" y="244" font-family="'Orbitron','JetBrains Mono',monospace" font-size="8" fill="#93c5fd" text-anchor="middle">pod v2.4.1</text>

  <rect x="723" y="226" width="55" height="28" fill="#0f172a" stroke="#3b82f6" stroke-width="1" rx="1"/>
  <text x="750" y="244" font-family="'Orbitron','JetBrains Mono',monospace" font-size="8" fill="#93c5fd" text-anchor="middle">pod v2.4.1</text>

  <rect x="786" y="226" width="55" height="28" fill="#0f172a" stroke="#3b82f6" stroke-width="1" rx="1"/>
  <text x="813" y="244" font-family="'Orbitron','JetBrains Mono',monospace" font-size="8" fill="#93c5fd" text-anchor="middle">pod v2.4.1</text>

  <!-- Drift detected indicator -->
  <text x="763" y="283" font-family="'Orbitron','JetBrains Mono',monospace" font-size="9" fill="#ff6b8a" text-anchor="middle" letter-spacing="1">⚠ DRIFT DETECTED → REVERTED</text>

  <!-- Red kubectl apply warning -->
  <rect x="648" y="318" width="230" height="30" fill="#1a0000" stroke="#ff003c" stroke-width="1" stroke-dasharray="3,2" rx="2"/>
  <text x="763" y="338" font-family="'Orbitron','JetBrains Mono',monospace" font-size="9" fill="#ff6b8a" text-anchor="middle" letter-spacing="1">✗  kubectl apply bypassed</text>

  <!-- Drift loop arrow back to ArgoCD -->
  <path d="M 878 296 Q 920 296 920 231" stroke="#ff003c" stroke-width="1.5" stroke-dasharray="5,3" fill="none" opacity="0.7"/>
  <polygon points="916,236 920,226 924,236" fill="#ff003c" opacity="0.7"/>
  <text x="938" y="268" font-family="'Orbitron','JetBrains Mono',monospace" font-size="7" fill="#fca5a5" text-anchor="middle">detects</text>
  <text x="938" y="280" font-family="'Orbitron','JetBrains Mono',monospace" font-size="7" fill="#fca5a5" text-anchor="middle">drift</text>

  <!-- GitOps principles -->
  <text x="648" y="382" font-family="'Orbitron','JetBrains Mono',monospace" font-size="9" font-weight="700" fill="#7dd3fc" letter-spacing="3">FOUR PRINCIPLES</text>

  <rect x="648" y="393" width="118" height="36" fill="#0a0f1a" stroke="#1e3a5f" stroke-width="1" rx="1"/>
  <text x="707" y="408" font-family="'Orbitron','JetBrains Mono',monospace" font-size="8" fill="#93c5fd" text-anchor="middle">DECLARATIVE</text>
  <text x="707" y="421" font-family="'Orbitron','JetBrains Mono',monospace" font-size="7" fill="#94a3b8" text-anchor="middle">desired state in Git</text>

  <rect x="772" y="393" width="118" height="36" fill="#0a0f1a" stroke="#1e3a5f" stroke-width="1" rx="1"/>
  <text x="831" y="408" font-family="'Orbitron','JetBrains Mono',monospace" font-size="8" fill="#93c5fd" text-anchor="middle">VERSIONED</text>
  <text x="831" y="421" font-family="'Orbitron','JetBrains Mono',monospace" font-size="7" fill="#94a3b8" text-anchor="middle">immutable history</text>

  <rect x="648" y="435" width="118" height="36" fill="#0a0f1a" stroke="#1e3a5f" stroke-width="1" rx="1"/>
  <text x="707" y="450" font-family="'Orbitron','JetBrains Mono',monospace" font-size="8" fill="#93c5fd" text-anchor="middle">PULL-BASED</text>
  <text x="707" y="463" font-family="'Orbitron','JetBrains Mono',monospace" font-size="7" fill="#94a3b8" text-anchor="middle">no push to cluster</text>

  <rect x="772" y="435" width="118" height="36" fill="#0a0f1a" stroke="#1e3a5f" stroke-width="1" rx="1"/>
  <text x="831" y="450" font-family="'Orbitron','JetBrains Mono',monospace" font-size="8" fill="#93c5fd" text-anchor="middle">RECONCILED</text>
  <text x="831" y="463" font-family="'Orbitron','JetBrains Mono',monospace" font-size="7" fill="#94a3b8" text-anchor="middle">continuous drift fix</text>

  <!-- Outcome boxes -->
  <rect x="900" y="393" width="120" height="78" fill="#0a0f1a" stroke="#4ade80" stroke-width="1" rx="2"/>
  <text x="960" y="410" font-family="'Orbitron','JetBrains Mono',monospace" font-size="9" font-weight="700" fill="#4ade80" text-anchor="middle" letter-spacing="2">OUTCOMES</text>
  <text x="960" y="428" font-family="'Orbitron','JetBrains Mono',monospace" font-size="8" fill="#94a3b8" text-anchor="middle">✓ git revert rollback</text>
  <text x="960" y="443" font-family="'Orbitron','JetBrains Mono',monospace" font-size="8" fill="#94a3b8" text-anchor="middle">✓ full audit trail</text>
  <text x="960" y="458" font-family="'Orbitron','JetBrains Mono',monospace" font-size="8" fill="#94a3b8" text-anchor="middle">✓ DR from scratch</text>

  <!-- Bottom border -->
  <rect x="0" y="627" width="1200" height="3" fill="#60a5fa" opacity="0.3"/>
</svg>
