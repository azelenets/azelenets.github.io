  <text x="20" y="22" fill="rgba(0,243,255,0.4)" font-size="9" font-weight="700" letter-spacing="3">ARCHITECTURE_ANALYSIS</text>
  <text x="1180" y="22" fill="rgba(0,243,255,0.25)" font-size="9" font-weight="700" letter-spacing="2" text-anchor="end">SYS_COUPLING_DIAGNOSTIC</text>

  <!-- ═══════════════════════════════════════════════════════ LEFT PANEL -->

