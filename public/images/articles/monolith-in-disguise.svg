  <text x="285" y="390" fill="#ff003c" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="2" opacity="0.9">SHARED</text>
  <text x="285" y="403" fill="#ff003c" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="2" opacity="0.9">DATABASE</text>
