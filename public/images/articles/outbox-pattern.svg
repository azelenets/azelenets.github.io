<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="1200" height="620" font-family="'JetBrains Mono',monospace">
  <defs>
    <filter id="glow-c">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-y">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#ff003c" opacity="0.8"/>
    </marker>
    <marker id="arr-cyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#00f3ff" opacity="0.9"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#4ade80" opacity="0.8"/>
    </marker>
    <marker id="arr-yellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#facc15" opacity="0.8"/>
    </marker>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0L0 0 0 30" fill="none" stroke="rgba(0,243,255,0.025)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="620" fill="#050505"/>
  <rect width="1200" height="620" fill="url(#grid)"/>

  <!-- ── Header bar ── -->
  <rect width="1200" height="36" fill="rgba(0,243,255,0.035)"/>
  <line x1="0" y1="36" x2="1200" y2="36" stroke="rgba(0,243,255,0.1)" stroke-width="1"/>
  <text x="20" y="22" fill="rgba(0,243,255,0.45)" font-size="9" font-weight="700" letter-spacing="3">RELIABILITY_PATTERN_ANALYSIS</text>
  <text x="1180" y="22" fill="rgba(0,243,255,0.2)" font-size="9" font-weight="700" letter-spacing="2" text-anchor="end">OUTBOX_PATTERN · AT_LEAST_ONCE</text>

  <!-- ══════════════════════════════════════════════════════════
       TOP PANEL — THE PROBLEM
  ══════════════════════════════════════════════════════════ -->

  <rect x="20" y="48" width="1160" height="186" fill="rgba(255,0,60,0.015)" stroke="rgba(255,0,60,0.1)" stroke-width="1"/>
  <rect x="20" y="48" width="1160" height="28" fill="rgba(255,0,60,0.05)"/>
  <text x="38" y="66" fill="#ff003c" font-size="9" font-weight="700" letter-spacing="3" opacity="0.75">✗  DUAL_WRITE  —  THE_PROBLEM</text>
  <text x="1160" y="66" fill="rgba(255,0,60,0.35)" font-size="8" text-anchor="end" letter-spacing="1">RACE_CONDITION · DATA_LOSS_WINDOW</text>

  <!-- App Service box -->
  <rect x="52" y="94" width="130" height="110" fill="rgba(0,243,255,0.04)" stroke="rgba(0,243,255,0.18)" stroke-width="1"/>
  <text x="117" y="114" fill="rgba(0,243,255,0.45)" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="2">SERVICE</text>
  <text x="117" y="131" fill="white" font-size="10" font-weight="700" text-anchor="middle">ORDER_SVC</text>
  <line x1="72" y1="143" x2="162" y2="143" stroke="rgba(0,243,255,0.08)" stroke-width="1"/>
  <text x="117" y="158" fill="rgba(0,243,255,0.3)" font-size="7" text-anchor="middle">placeOrder()</text>
  <text x="117" y="172" fill="rgba(0,243,255,0.2)" font-size="7" text-anchor="middle">step 1 → DB</text>
  <text x="117" y="185" fill="rgba(0,243,255,0.2)" font-size="7" text-anchor="middle">step 2 → Kafka</text>

  <!-- Step 1 arrow: App → DB -->
  <line x1="182" y1="130" x2="326" y2="130" stroke="rgba(0,243,255,0.4)" stroke-width="1.5" marker-end="url(#arr-cyan)"/>
  <text x="254" y="120" fill="rgba(0,243,255,0.4)" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="1">① WRITE</text>

  <!-- DB box -->
  <rect x="328" y="94" width="130" height="58" fill="rgba(0,243,255,0.04)" stroke="rgba(0,243,255,0.18)" stroke-width="1"/>
  <ellipse cx="393" cy="100" rx="63" ry="8" fill="none" stroke="rgba(0,243,255,0.15)" stroke-width="1"/>
  <text x="393" y="127" fill="rgba(0,243,255,0.5)" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="2">POSTGRES</text>
  <text x="393" y="143" fill="white" font-size="9" font-weight="700" text-anchor="middle">orders table</text>

  <!-- CRASH / FAILURE zone -->
  <rect x="490" y="88" width="140" height="72" fill="rgba(255,0,60,0.06)" stroke="rgba(255,0,60,0.25)" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="560" y="112" fill="#ff003c" font-size="22" font-weight="900" text-anchor="middle" opacity="0.6">✕</text>
  <text x="560" y="132" fill="rgba(255,0,60,0.7)" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="2">CRASH HERE</text>
  <text x="560" y="147" fill="rgba(255,0,60,0.45)" font-size="7" text-anchor="middle">process dies / Kafka down</text>

  <!-- Step 2 arrow (broken) -->
  <line x1="182" y1="160" x2="488" y2="160" stroke="rgba(255,0,60,0.5)" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <text x="335" y="175" fill="rgba(255,0,60,0.45)" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="1">② PUBLISH (may never happen)</text>

  <!-- Kafka box (greyed out / lost) -->
  <rect x="660" y="94" width="130" height="58" fill="rgba(255,0,60,0.03)" stroke="rgba(255,0,60,0.2)" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="725" y="118" fill="rgba(255,0,60,0.35)" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="2">KAFKA</text>
  <text x="725" y="138" fill="rgba(255,0,60,0.25)" font-size="9" text-anchor="middle">event LOST</text>

  <!-- Result label -->
  <rect x="840" y="94" width="300" height="110" fill="rgba(255,0,60,0.04)" stroke="rgba(255,0,60,0.15)" stroke-width="1"/>
  <text x="856" y="117" fill="rgba(255,0,60,0.6)" font-size="8" font-weight="700" letter-spacing="2">FAILURE MODES:</text>
  <text x="856" y="137" fill="rgba(255,100,100,0.5)" font-size="8">▸ crash after DB write → event never published</text>
  <text x="856" y="154" fill="rgba(255,100,100,0.5)" font-size="8">▸ Kafka timeout → DB committed, event lost</text>
  <text x="856" y="171" fill="rgba(255,100,100,0.5)" font-size="8">▸ publish first → phantom event if DB fails</text>
  <text x="856" y="188" fill="rgba(255,0,60,0.4)" font-size="8" font-style="italic">no safe ordering for a dual write</text>

  <!-- ══════════════════════════════════════════════════════════
       DIVIDER
  ══════════════════════════════════════════════════════════ -->

  <line x1="0" y1="236" x2="1200" y2="236" stroke="rgba(0,243,255,0.06)" stroke-width="1"/>

  <!-- ══════════════════════════════════════════════════════════
       BOTTOM PANEL — THE SOLUTION
  ══════════════════════════════════════════════════════════ -->

  <rect x="20" y="244" width="1160" height="358" fill="rgba(0,243,255,0.01)" stroke="rgba(0,243,255,0.08)" stroke-width="1"/>
  <rect x="20" y="244" width="1160" height="28" fill="rgba(0,243,255,0.04)"/>
  <text x="38" y="262" fill="#00f3ff" font-size="9" font-weight="700" letter-spacing="3" opacity="0.7">✓  OUTBOX_PATTERN  —  THE_SOLUTION</text>
  <text x="1160" y="262" fill="rgba(0,243,255,0.3)" font-size="8" text-anchor="end" letter-spacing="1">ATOMIC_WRITE · RELIABLE_RELAY · IDEMPOTENT_CONSUMERS</text>

  <!-- ── App Service ── -->
  <rect x="52" y="298" width="138" height="88" fill="rgba(0,243,255,0.04)" stroke="rgba(0,243,255,0.2)" stroke-width="1.5"/>
  <text x="121" y="320" fill="rgba(0,243,255,0.45)" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="2">SERVICE</text>
  <text x="121" y="337" fill="white" font-size="11" font-weight="700" text-anchor="middle">ORDER_SVC</text>
  <line x1="72" y1="348" x2="170" y2="348" stroke="rgba(0,243,255,0.08)" stroke-width="1"/>
  <text x="121" y="364" fill="rgba(0,243,255,0.3)" font-size="7" text-anchor="middle">db.transaction()</text>
  <text x="121" y="378" fill="rgba(0,243,255,0.2)" font-size="7" text-anchor="middle">INSERT orders + outbox</text>

  <!-- ── Single TX arrow ── -->
  <line x1="190" y1="340" x2="268" y2="340" stroke="rgba(0,243,255,0.5)" stroke-width="2" marker-end="url(#arr-cyan)"/>
  <text x="229" y="330" fill="rgba(0,243,255,0.55)" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="1">SINGLE TX</text>

  <!-- ── PostgreSQL with two tables (transaction boundary) ── -->
  <rect x="270" y="278" width="200" height="188" fill="rgba(0,243,255,0.02)" stroke="rgba(0,243,255,0.15)" stroke-width="1" rx="2"/>
  <!-- PG label -->
  <text x="370" y="298" fill="rgba(0,243,255,0.4)" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="3">POSTGRESQL</text>
  <!-- WAL label -->
  <text x="370" y="312" fill="rgba(0,243,255,0.2)" font-size="7" text-anchor="middle">Write-Ahead Log (WAL)</text>

  <!-- orders table -->
  <rect x="290" y="320" width="160" height="48" fill="rgba(0,243,255,0.05)" stroke="rgba(0,243,255,0.2)" stroke-width="1"/>
  <text x="370" y="339" fill="rgba(0,243,255,0.4)" font-size="7" font-weight="700" text-anchor="middle" letter-spacing="2">TABLE</text>
  <text x="370" y="357" fill="white" font-size="10" font-weight="700" text-anchor="middle">orders</text>

  <!-- outbox table -->
  <rect x="290" y="378" width="160" height="56" fill="rgba(250,204,21,0.05)" stroke="rgba(250,204,21,0.25)" stroke-width="1.5" filter="url(#glow-y)"/>
  <text x="370" y="397" fill="rgba(250,204,21,0.55)" font-size="7" font-weight="700" text-anchor="middle" letter-spacing="2">OUTBOX TABLE</text>
  <text x="370" y="414" fill="white" font-size="10" font-weight="700" text-anchor="middle">outbox_events</text>
  <text x="370" y="427" fill="rgba(250,204,21,0.35)" font-size="7" text-anchor="middle">published_at IS NULL → pending</text>

  <!-- ATOMIC TX bracket -->
  <line x1="276" y1="318" x2="276" y2="438" stroke="rgba(0,243,255,0.3)" stroke-width="1.5"/>
  <line x1="276" y1="318" x2="284" y2="318" stroke="rgba(0,243,255,0.3)" stroke-width="1.5"/>
  <line x1="276" y1="438" x2="284" y2="438" stroke="rgba(0,243,255,0.3)" stroke-width="1.5"/>
  <text x="272" y="385" fill="rgba(0,243,255,0.45)" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="1" transform="rotate(-90,272,385)">ATOMIC</text>

  <!-- ── CDC / Polling Relay ── -->
  <!-- WAL tail arrow from Postgres to Relay -->
  <line x1="470" y1="406" x2="548" y2="406" stroke="rgba(250,204,21,0.5)" stroke-width="1.5" marker-end="url(#arr-yellow)"/>
  <text x="509" y="396" fill="rgba(250,204,21,0.5)" font-size="7" font-weight="700" text-anchor="middle" letter-spacing="1">TAIL WAL</text>
  <text x="509" y="418" fill="rgba(250,204,21,0.3)" font-size="7" text-anchor="middle">or poll query</text>

  <rect x="550" y="374" width="148" height="70" fill="rgba(250,204,21,0.04)" stroke="rgba(250,204,21,0.25)" stroke-width="1.5"/>
  <text x="624" y="397" fill="rgba(250,204,21,0.5)" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="2">RELAY</text>
  <text x="624" y="413" fill="white" font-size="10" font-weight="700" text-anchor="middle">CDC / Debezium</text>
  <text x="624" y="429" fill="rgba(250,204,21,0.3)" font-size="7" text-anchor="middle">or polling publisher</text>
  <!-- resume marker -->
  <text x="624" y="440" fill="rgba(250,204,21,0.2)" font-size="7" text-anchor="middle">resumes from WAL offset</text>

  <!-- Relay → Kafka arrow (at-least-once) -->
  <line x1="698" y1="406" x2="768" y2="406" stroke="rgba(0,243,255,0.55)" stroke-width="2" marker-end="url(#arr-cyan)"/>
  <text x="733" y="396" fill="rgba(0,243,255,0.5)" font-size="7" font-weight="700" text-anchor="middle" letter-spacing="1">PUBLISH</text>
  <text x="733" y="418" fill="rgba(0,243,255,0.3)" font-size="7" text-anchor="middle">at-least-once</text>

  <!-- ── Kafka ── -->
  <rect x="770" y="360" width="148" height="92" fill="rgba(0,243,255,0.04)" stroke="rgba(0,243,255,0.25)" stroke-width="1.5" filter="url(#glow-c)"/>
  <text x="844" y="382" fill="rgba(0,243,255,0.45)" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="2">KAFKA</text>
  <!-- Partition lines -->
  <rect x="790" y="388" width="108" height="12" fill="rgba(0,243,255,0.06)" stroke="rgba(0,243,255,0.12)" stroke-width="1"/>
  <rect x="790" y="402" width="108" height="12" fill="rgba(0,243,255,0.04)" stroke="rgba(0,243,255,0.1)" stroke-width="1"/>
  <rect x="790" y="416" width="108" height="12" fill="rgba(0,243,255,0.03)" stroke="rgba(0,243,255,0.08)" stroke-width="1"/>
  <text x="844" y="399" fill="rgba(0,243,255,0.35)" font-size="7" text-anchor="middle">outbox.Order  [p0]</text>
  <text x="844" y="413" fill="rgba(0,243,255,0.25)" font-size="7" text-anchor="middle">outbox.Order  [p1]</text>
  <text x="844" y="427" fill="rgba(0,243,255,0.18)" font-size="7" text-anchor="middle">outbox.Order  [p2]</text>
  <text x="844" y="444" fill="rgba(0,243,255,0.2)" font-size="7" text-anchor="middle">consumer-group: order-svc</text>

  <!-- ── Consumers fan-out ── -->
  <!-- Kafka → Consumer 1 -->
  <line x1="918" y1="376" x2="978" y2="348" stroke="rgba(74,222,128,0.5)" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <!-- Kafka → Consumer 2 -->
  <line x1="918" y1="406" x2="978" y2="406" stroke="rgba(74,222,128,0.5)" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <!-- Kafka → Consumer 3 -->
  <line x1="918" y1="436" x2="978" y2="462" stroke="rgba(74,222,128,0.5)" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Consumer 1: Inventory -->
  <rect x="980" y="316" width="180" height="54" fill="rgba(74,222,128,0.04)" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
  <text x="1070" y="336" fill="rgba(74,222,128,0.45)" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="1">INVENTORY_SVC</text>
  <text x="1070" y="351" fill="rgba(74,222,128,0.3)" font-size="7" text-anchor="middle">idempotency check ✓</text>
  <text x="1070" y="362" fill="rgba(74,222,128,0.2)" font-size="7" text-anchor="middle">reserve stock</text>

  <!-- Consumer 2: Notification -->
  <rect x="980" y="380" width="180" height="54" fill="rgba(74,222,128,0.04)" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
  <text x="1070" y="400" fill="rgba(74,222,128,0.45)" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="1">NOTIF_SVC</text>
  <text x="1070" y="415" fill="rgba(74,222,128,0.3)" font-size="7" text-anchor="middle">idempotency check ✓</text>
  <text x="1070" y="426" fill="rgba(74,222,128,0.2)" font-size="7" text-anchor="middle">send confirmation email</text>

  <!-- Consumer 3: Analytics -->
  <rect x="980" y="444" width="180" height="54" fill="rgba(74,222,128,0.04)" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
  <text x="1070" y="464" fill="rgba(74,222,128,0.45)" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="1">ANALYTICS_SVC</text>
  <text x="1070" y="479" fill="rgba(74,222,128,0.3)" font-size="7" text-anchor="middle">idempotency check ✓</text>
  <text x="1070" y="490" fill="rgba(74,222,128,0.2)" font-size="7" text-anchor="middle">track conversion event</text>

  <!-- ── Guarantee callout boxes at bottom ── -->
  <rect x="52" y="520" width="198" height="60" fill="rgba(0,243,255,0.04)" stroke="rgba(0,243,255,0.12)" stroke-width="1"/>
  <text x="151" y="538" fill="rgba(0,243,255,0.55)" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="2">GUARANTEE 1</text>
  <text x="151" y="554" fill="rgba(0,243,255,0.35)" font-size="7" text-anchor="middle">Atomic: orders + outbox</text>
  <text x="151" y="567" fill="rgba(0,243,255,0.25)" font-size="7" text-anchor="middle">commit or rollback together</text>

  <rect x="270" y="520" width="198" height="60" fill="rgba(250,204,21,0.04)" stroke="rgba(250,204,21,0.12)" stroke-width="1"/>
  <text x="369" y="538" fill="rgba(250,204,21,0.55)" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="2">GUARANTEE 2</text>
  <text x="369" y="554" fill="rgba(250,204,21,0.35)" font-size="7" text-anchor="middle">Durable: relay resumes from</text>
  <text x="369" y="567" fill="rgba(250,204,21,0.25)" font-size="7" text-anchor="middle">WAL offset on restart</text>

  <rect x="488" y="520" width="198" height="60" fill="rgba(74,222,128,0.04)" stroke="rgba(74,222,128,0.12)" stroke-width="1"/>
  <text x="587" y="538" fill="rgba(74,222,128,0.55)" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="2">GUARANTEE 3</text>
  <text x="587" y="554" fill="rgba(74,222,128,0.35)" font-size="7" text-anchor="middle">Idempotent: duplicate events</text>
  <text x="587" y="567" fill="rgba(74,222,128,0.25)" font-size="7" text-anchor="middle">silently skipped by consumers</text>

  <!-- No 2PC callout -->
  <rect x="706" y="520" width="474" height="60" fill="rgba(0,243,255,0.025)" stroke="rgba(0,243,255,0.1)" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="943" y="538" fill="rgba(0,243,255,0.45)" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="3">NO 2PC · NO XA BRIDGE · NO DISTRIBUTED COORDINATOR</text>
  <text x="943" y="555" fill="rgba(0,243,255,0.25)" font-size="8" text-anchor="middle">only your existing PostgreSQL + Kafka infrastructure</text>
  <text x="943" y="568" fill="rgba(0,243,255,0.18)" font-size="7" text-anchor="middle">at-least-once delivery + idempotent consumers = effective exactly-once</text>

  <!-- Footer line -->
  <line x1="0" y1="602" x2="1200" y2="602" stroke="rgba(0,243,255,0.06)" stroke-width="1"/>
  <text x="20" y="615" fill="rgba(0,243,255,0.15)" font-size="8" letter-spacing="2">OUTBOX_PATTERN.SVG</text>
  <text x="1180" y="615" fill="rgba(0,243,255,0.15)" font-size="8" letter-spacing="2" text-anchor="end">REF: DUAL_WRITE · CDC · IDEMPOTENCY</text>
</svg>
