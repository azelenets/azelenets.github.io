<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 // SIGNAL LOST — AEGIS TACTICAL INTERFACE</title>
    <script>
      // SPA routing redirect for GitHub Pages:
      // Encode the current path into ?p= and send to index.html, which
      // restores it via history.replaceState before React boots.
      (function () {
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          '/?p=' + encodeURIComponent(l.pathname) +
          (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') +
          l.hash
        );
      })();
    </script>

    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background-color: #050505;
        color: #cbd5e1;
        font-family: 'Space Grotesk', sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .cyber-grid {
        background-image:
          linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
        background-size: 30px 30px;
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }

      .scanlines {
        background: linear-gradient(
          to bottom,
          rgba(255,255,255,0), rgba(255,255,255,0) 50%,
          rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2)
        );
        background-size: 100% 4px;
        position: fixed;
        inset: 0;
        z-index: 9999;
        pointer-events: none;
        opacity: 0.15;
      }

      .container {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 3rem;
        max-width: 600px;
        width: 100%;
      }

      .hud-panel {
        position: relative;
        border: 1px solid rgba(0, 243, 255, 0.2);
        background: rgba(10, 10, 10, 0.9);
        backdrop-filter: blur(8px);
        padding: 3rem 2.5rem;
      }

      .hud-panel::before {
        content: '';
        position: absolute;
        top: -1px; left: -1px;
        width: 12px; height: 12px;
        border-top: 2px solid #00f3ff;
        border-left: 2px solid #00f3ff;
      }

      .hud-panel::after {
        content: '';
        position: absolute;
        bottom: -1px; right: -1px;
        width: 12px; height: 12px;
        border-bottom: 2px solid #00f3ff;
        border-right: 2px solid #00f3ff;
      }

      .eyebrow {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.625rem;
        font-weight: 700;
        letter-spacing: 0.15em;
        color: rgba(92, 226, 239, 0.95);
        text-transform: uppercase;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }

      .eyebrow::before,
      .eyebrow::after {
        content: '';
        display: block;
        height: 1px;
        width: 40px;
        background: rgba(92, 226, 239, 0.6);
      }

      .error-code {
        font-family: 'Orbitron', sans-serif;
        font-size: clamp(5rem, 20vw, 8rem);
        font-weight: 900;
        line-height: 1;
        color: #ff003c;
        text-shadow:
          0 0 20px rgba(255, 0, 60, 0.5),
          0 0 60px rgba(255, 0, 60, 0.2);
        letter-spacing: 0.05em;
        margin-bottom: 0.25rem;
        animation: flicker 4s infinite;
      }

      .error-label {
        font-family: 'Orbitron', sans-serif;
        font-size: 1rem;
        font-weight: 700;
        color: rgba(255, 92, 125, 0.95);
        letter-spacing: 0.3em;
        text-transform: uppercase;
        margin-bottom: 2rem;
      }

      .divider {
        height: 1px;
        background: linear-gradient(to right, transparent, rgba(92, 226, 239, 0.6), transparent);
        margin: 1.5rem 0;
      }

      .message {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.75rem;
        color: rgba(203, 213, 225, 0.9);
        line-height: 1.8;
        margin-bottom: 2rem;
      }

      .status-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.625rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: rgba(114, 235, 245, 0.95);
        text-transform: uppercase;
      }

      .ping {
        width: 6px;
        height: 6px;
        background: #00f3ff;
        border-radius: 50%;
        animation: ping 1.2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      .footer-meta {
        margin-top: 2rem;
        display: flex;
        justify-content: space-between;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.5rem;
        color: rgba(182, 190, 201, 0.95);
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      @keyframes flicker {
        0%, 95%, 100% { opacity: 1; }
        96% { opacity: 0.6; }
        97% { opacity: 1; }
        98% { opacity: 0.7; }
        99% { opacity: 1; }
      }

      @keyframes ping {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.4; transform: scale(0.75); }
      }
    </style>
  </head>
  <body>
    <div class="cyber-grid"></div>
    <div class="scanlines"></div>

    <div class="container">
      <div class="hud-panel">
        <div class="eyebrow">AEGIS TACTICAL INTERFACE // SYS_ERR</div>

        <div class="error-code">404</div>
        <div class="error-label">SIGNAL LOST</div>

        <div class="divider"></div>

        <p class="message">
          TARGET COORDINATES NOT FOUND IN TACTICAL DATABASE.<br />
          INITIATING AUTOMATIC REROUTE SEQUENCE...
        </p>

        <div class="status-row">
          <div class="ping"></div>
          REROUTING TO BASE
        </div>

        <div class="footer-meta">
          <span>NODE: GHP_EDGE</span>
          <span>ERR: 0x404</span>
          <span>STATUS: REROUTING</span>
        </div>
      </div>
    </div>
  </body>
</html>
